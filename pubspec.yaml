name: covertrack
description: Precision coverage tracking for lawn care, pest control, and small farming.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Supabase & Auth
  supabase_flutter: ^2.0.0
  
  # State Management
  provider: ^6.0.0

  # Location & GPS
  geolocator: ^9.0.0
  latlong2: ^0.9.0
  turf: ^0.0.10
  
  # Mapping
  flutter_map: ^6.0.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # PDF Generation
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # HTTP & Network
  http: ^1.1.0
  dio: ^5.3.0
  connectivity_plus: ^6.1.3

  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0

  # Utils
  intl: ^0.19.0
  logger: ^2.0.0
  uuid: ^4.0.0
  url_launcher: ^6.0.0
  webview_flutter: ^4.4.0
  file_picker: ^10.3.10
  signature: ^5.5.0
  google_fonts: ^6.2.1
  carousel_slider: ^4.2.1
  
  # Payments
  stripe_sdk: ^5.0.0
  
  # Analytics & Charts
  fl_chart: ^0.67.0
  flutter_animate: ^4.5.0
  wakelock_plus: ^1.2.8
  sensors_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

